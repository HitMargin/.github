name: Generate Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 左栏:基础信息 + 组织简介
      - name: Generate Metrics (left)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: HitMargin
          template: classic
          filename: metrics-left.svg
          config_timezone: Asia/Shanghai
          base: header, repositories, metadata
          plugin_introduction: yes
          plugin_traffic: yes

      # 右栏:语言占比 + 代码行数 + issue/PR 状态
      - name: Generate Metrics (right)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: HitMargin
          template: classic
          filename: metrics-right.svg
          config_timezone: Asia/Shanghai
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_sections: base
          plugin_followup: yes

          # 组织 Projects 看板(需要指定具体项目,先占位,没有就删掉这三行)
          # plugin_projects: yes
          # plugin_projects_repositories: adofaiex/xxx/projects/1
